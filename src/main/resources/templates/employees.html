<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employees</title>

    <link rel="stylesheet" th:href="@{/style.css}">

</head>

<body>

<nav class="navbar">

    <div class="logo">
        Employee Management System
    </div>

    <ul class="nav-links">

        <li><a th:href="@{/}">Dashboard</a></li>

        <li><a th:href="@{/employees}" class="active">Employees</a></li>

        <li><a th:href="@{/add}">Add Employee</a></li>

    </ul>

</nav>

<div class="container">

    <div class="table-card">

        <div class="heading">

            <div>

                <h2>Employee List</h2>

                <p style="color:#64748b;margin-top:5px;">
                    Manage all employee records
                </p>

            </div>

            <a th:href="@{/add}" class="btn">
                + Add Employee
            </a>

        </div>

        <input
                type="text"
                id="searchInput"
                class="search-box"
                placeholder="Search by Name, Email, Department..."
                onkeyup="searchEmployee()">

        <table id="employeeTable">

            <thead>

            <tr>

                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Actions</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="employee : ${employees}">

                <td th:text="${employee.id}"></td>

                <td th:text="${employee.name}"></td>

                <td th:text="${employee.email}"></td>

                <td th:text="${employee.phone}"></td>

                <td>
                    <span style="
                    background:#dbeafe;
                    color:#1d4ed8;
                    padding:6px 12px;
                    border-radius:20px;
                    font-size:13px;
                    font-weight:600;"
                          th:text="${employee.department}">
                    </span>
                </td>

                <td>

                    ₹ <span th:text="${employee.salary}"></span>

                </td>

                <td>

                    <a th:href="@{/edit/{id}(id=${employee.id})}"
                       class="edit-btn">

                        ✏ Edit

                    </a>

                    <a th:href="@{/delete/{id}(id=${employee.id})}"
                       class="delete-btn"
                       onclick="return confirmDelete()">

                        🗑 Delete

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<div class="footer">

    © 2026 Employee Management System | Developed by Vinod T R

</div>

<script th:src="@{/script.js}"></script>

</body>

</html>
