<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Employee</title>

    <link rel="stylesheet" th:href="@{/style.css}">

</head>

<body>

<!-- Navbar -->

<nav class="navbar">

    <div class="logo">
        Employee Management System
    </div>

    <ul class="nav-links">

        <li>
            <a th:href="@{/}">
                Dashboard
            </a>
        </li>

        <li>
            <a th:href="@{/employees}">
                Employees
            </a>
        </li>

        <li>
            <a th:href="@{/add}">
                Add Employee
            </a>
        </li>

    </ul>

</nav>

<div class="container">

    <div class="form-card">

        <h2 class="form-title">
            Add New Employee
        </h2>

        <form th:action="@{/save}" th:object="${employee}" method="post">

            <div class="form-grid">

                <div class="form-group">

                    <label>Employee Name</label>

                    <input type="text"
                           th:field="*{name}"
                           placeholder="Enter Employee Name"
                           required>

                </div>

                <div class="form-group">

                    <label>Email Address</label>

                    <input type="email"
                           th:field="*{email}"
                           placeholder="Enter Email"
                           required>

                </div>

                <div class="form-group">

                    <label>Phone Number</label>

                    <input type="text"
                           th:field="*{phone}"
                           placeholder="Enter Phone Number"
                           required>

                </div>

                <div class="form-group">

                    <label>Department</label>

                    <input type="text"
                           th:field="*{department}"
                           placeholder="Enter Department"
                           required>

                </div>

                <div class="form-group full-width">

                    <label>Salary</label>

                    <input type="number"
                           th:field="*{salary}"
                           placeholder="Enter Salary"
                           required>

                </div>

            </div>

            <div class="btn-group">

                <button type="submit" class="btn save-btn">
                    Save Employee
                </button>

                <a th:href="@{/employees}" class="btn back-btn">
                    Back
                </a>

            </div>

        </form>

    </div>

</div>

<script th:src="@{/script.js}"></script>

</body>

</html>
